name: Release

# =============================================================================
# 版本发布 — 推送 v* 标签时创建 GitHub Release + 版本化 Docker 镜像
# =============================================================================
on:
  push:
    tags:
      - 'v*'

jobs:
  # ===========================================================================
  # GitHub Release
  # ===========================================================================
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  # ===========================================================================
  # Docker 构建 & 推送（复用 docker-build workflow，版本标签）
  # ===========================================================================
  docker-build:
    needs: release
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      image: my-pan
      tags: |
        type=raw,value=${{ github.ref_name }}
