name: Deploy Worker

# 在 cloudflare 和 server 两个环境部署

# 并发控制：同一分支同时只允许一个部署运行，新触发自动取消旧运行
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# =============================================================================
# 触发器
# =============================================================================
on:
  push:
    branches: [master]
    paths:
      - 'worker/**'
      - 'server/**'
      - 'pages/public/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# =============================================================================
# Job 依赖链: deploy (CloudFlare) → docker-build → server-deploy (SSH)
# 前一步失败则后续全部跳过，避免不一致状态
# =============================================================================
jobs:
  # ===========================================================================
  # CloudFlare Worker 部署
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      D1_DATABASE_NAME: ${{ secrets.D1_DATABASE_NAME }}
      KV_BINDING_ID: ${{ secrets.KV_BINDING_ID }}

    steps:
      # ---- 环境准备 ----
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - working-directory: worker
        run: npm ci

      # ---- 类型检查（安全网：CI 已检查但部署前再次确认） ----
      - working-directory: worker
        run: npx tsc --noEmit

      # ---- 同步机密到 CloudFlare Worker ----

      - working-directory: worker
        run: |
          cat << 'ENDOFSECRET' | npx wrangler secret put S3_LIST_JSON
          ${{ secrets.S3_LIST_JSON }}
          ENDOFSECRET

      - working-directory: worker
        run: |
          if [ -n "$AUTH_PASSWORD" ]; then
            printf '%s' "$AUTH_PASSWORD" | npx wrangler secret put AUTH_PASSWORD
          fi
        env:
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}

      # ---- D1 / KV 配置 ----
      - working-directory: worker
        run: |
          sed -i '/^\[\[d1_databases\]\]/,/^database_id =/d' wrangler.toml
          sed -i '/^\[\[kv_namespaces\]\]/,/^id =/d' wrangler.toml

      - working-directory: worker
        if: ${{ env.D1_DATABASE_NAME != '' }}
        run: |
          echo "Looking up D1 database: $D1_DATABASE_NAME"
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | jq -r ".[] | select(.name==\"$D1_DATABASE_NAME\") | .uuid" 2>/dev/null)
          if [ -z "$DB_ID" ]; then
            DB_ID=$(npx wrangler d1 list 2>&1 | grep -F "$D1_DATABASE_NAME" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          fi
          if [ -n "$DB_ID" ]; then
            echo "Found existing database: $D1_DATABASE_NAME ($DB_ID)"
          else
            echo "Creating D1 database: $D1_DATABASE_NAME"
            DB_ID=$(npx wrangler d1 create "$D1_DATABASE_NAME" 2>&1 | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
            if [ -z "$DB_ID" ]; then
              echo "::error::Failed to create D1 database '$D1_DATABASE_NAME'"
              exit 1
            fi
            echo "Created database: $D1_DATABASE_NAME ($DB_ID)"
          fi

          cat >> wrangler.toml << D1EOF
          [[d1_databases]]
          binding = "DB"
          database_name = "$D1_DATABASE_NAME"
          database_id = "$DB_ID"
          D1EOF

      - working-directory: worker
        if: ${{ env.KV_BINDING_ID != '' }}
        run: |
          cat >> wrangler.toml << KVEOF
          [[kv_namespaces]]
          binding = "KV_BINDING"
          id = "$KV_BINDING_ID"
          KVEOF

      - working-directory: worker
        if: ${{ env.D1_DATABASE_NAME != '' }}
        run: npx wrangler d1 execute "$D1_DATABASE_NAME" --remote --file=./db/schema.sql

      # ---- 部署 ----
      - working-directory: worker
        run: npx wrangler deploy

  # ===========================================================================
  # Docker 构建 & 推送（复用 docker-build workflow）
  # ===========================================================================
  docker-build:
    needs: deploy
    uses: ./.github/workflows/docker-build.yml
    secrets: inherit
    with:
      image: my-pan
      tags: |
        type=raw,value=latest,enable={{is_default_branch}}
        type=sha,prefix=sha-,format=short

  # ===========================================================================
  # 服务器容器更新（仅当 CONTAINER_DIR 已配置时执行）
  # ===========================================================================
  server-deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    environment: server
    env:
      CONTAINER_DIR: ${{ secrets.CONTAINER_DIR }}
    steps:
      - name: Deploy to server
        if: ${{ env.CONTAINER_DIR != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            cd ${{ secrets.CONTAINER_DIR }}
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f
